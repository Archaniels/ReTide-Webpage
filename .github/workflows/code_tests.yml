name: Testing for Code Coverage

on:
  push:
    branches:
      - production
      - preview
  pull_request:
    branches:
      - production
      - preview

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        coverage: pcov

    # 1. Create necessary directories and set full write permissions early
    - name: Prepare Directories and Permissions
      run: |
        mkdir -p storage bootstrap/cache
        chmod -R 777 storage bootstrap/cache

    - name: Install Composer Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install NPM Dependencies
      run: npm install

    # 2. Safely run Artisan commands now that directories are writable
    - name: Prepare Laravel Environment
      run: |
        cp .env.example .env
        php artisan key:generate
        touch database/database.sqlite
        php artisan migrate --force
        php artisan config:clear
        php artisan cache:clear

    - name: Build Frontend Assets
      run: npm run build

    - name: Run Code Coverage Test
      run: php artisan test --coverage-clover=coverage.xml --min=0
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: true

    - name: Archive Code Coverage Results
      uses: actions/upload-artifact@v5
      with:
        name: code-coverage-report
        path: coverage.xml

    - name: Start App for E2E Tests
      run: |
        php artisan serve --port=8000 &
        npm run dev &
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite

    - name: Run Katalon UI Regression Tests
      uses: katalon-studio/katalon-studio-github-action@v3.0
      with:
          version: '9.0.0'
          projectPath: '${{ github.workspace }}/katalon-tests/ReTideWebpageBBT'
          args: '-retry=0 -testSuiteCollectionPath="Test Suites/Collections" -apiKey=${{ secrets.KATALON_API_KEY }}'
